name: Build Minecraft Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Forge MDK
        run: |
          wget -q https://maven.minecraftforge.net/net/minecraftforge/forge/1.20.1-47.2.0/forge-1.20.1-47.2.0-mdk.zip -O forge-mdk.zip
          unzip -q forge-mdk.zip -d forge-mdk

      - name: Setup project structure
        run: |
          cd forge-mdk
          # Copy our source files into correct structure
          mkdir -p src/main/java/com/wavesurvival/mod/core
          mkdir -p src/main/java/com/wavesurvival/mod/wave
          mkdir -p src/main/java/com/wavesurvival/mod/gui
          mkdir -p src/main/java/com/wavesurvival/mod/events
          mkdir -p src/main/java/com/wavesurvival/mod/items
          mkdir -p src/main/java/com/wavesurvival/mod/network/packets
          mkdir -p src/main/resources/META-INF
          mkdir -p src/main/resources/assets/wavesurvival/lang

          # Copy Java files from repo root
          cp ../WaveSurvivalMod.java src/main/java/com/wavesurvival/mod/core/ 2>/dev/null || true
          cp ../ClientSetup.java src/main/java/com/wavesurvival/mod/core/ 2>/dev/null || true
          cp ../WaveManager.java src/main/java/com/wavesurvival/mod/wave/ 2>/dev/null || true
          cp ../PlayerCoinData.java src/main/java/com/wavesurvival/mod/wave/ 2>/dev/null || true
          cp ../CoinCapability.java src/main/java/com/wavesurvival/mod/wave/ 2>/dev/null || true
          cp ../ForgeEventHandler.java src/main/java/com/wavesurvival/mod/events/ 2>/dev/null || true
          cp ../ShopMenuType.java src/main/java/com/wavesurvival/mod/gui/ 2>/dev/null || true
          cp ../ShopMenu.java src/main/java/com/wavesurvival/mod/gui/ 2>/dev/null || true
          cp ../ShopScreen.java src/main/java/com/wavesurvival/mod/gui/ 2>/dev/null || true
          cp ../ClientWaveData.java src/main/java/com/wavesurvival/mod/gui/ 2>/dev/null || true
          cp ../WaveHud.java src/main/java/com/wavesurvival/mod/gui/ 2>/dev/null || true
          cp ../KeyBindings.java src/main/java/com/wavesurvival/mod/gui/ 2>/dev/null || true
          cp ../CoinItem.java src/main/java/com/wavesurvival/mod/items/ 2>/dev/null || true
          cp ../NetworkHandler.java src/main/java/com/wavesurvival/mod/network/ 2>/dev/null || true
          cp ../SyncWaveDataPacket.java src/main/java/com/wavesurvival/mod/network/packets/ 2>/dev/null || true
          cp ../SyncCoinPacket.java src/main/java/com/wavesurvival/mod/network/packets/ 2>/dev/null || true
          cp ../OpenShopPacket.java src/main/java/com/wavesurvival/mod/network/packets/ 2>/dev/null || true
          cp ../BuyItemPacket.java src/main/java/com/wavesurvival/mod/network/packets/ 2>/dev/null || true
          cp ../mods.toml src/main/resources/META-INF/ 2>/dev/null || true
          cp ../pack.mcmeta src/main/resources/ 2>/dev/null || true
          cp ../en_us.json src/main/resources/assets/wavesurvival/lang/ 2>/dev/null || true

          # Use our build.gradle and settings.gradle
          cp ../settings.gradle . 2>/dev/null || true

          # Write our build.gradle
          cat > build.gradle << 'GRADLE'
plugins {
    id 'eclipse'
    id 'idea'
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
}
version = '1.0.0'
group = 'com.wavesurvival'
base { archivesName = 'wavesurvival-1.20.1' }
java.toolchain.languageVersion = JavaLanguageVersion.of(17)
minecraft {
    mappings channel: 'official', version: '1.20.1'
    runs {
        client {
            workingDirectory project.file('run')
            mods { wavesurvival { source sourceSets.main } }
        }
        server {
            workingDirectory project.file('run')
            mods { wavesurvival { source sourceSets.main } }
        }
    }
}
dependencies {
    minecraft 'net.minecraftforge:forge:1.20.1-47.2.0'
}
jar {
    manifest {
        attributes(['Specification-Title': 'wavesurvival', 'Implementation-Version': project.jar.archiveVersion])
    }
}
GRADLE

      - name: Build mod
        run: |
          cd forge-mdk
          chmod +x gradlew
          ./gradlew build --no-daemon 2>&1 | tail -50

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v3
        with:
          name: wavesurvival-mod-jar
          path: forge-mdk/build/libs/wavesurvival-1.20.1-*.jar
          if-no-files-found: warn
